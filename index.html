
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --card: #1c1c28;
      --x-color: #e85d75;
      --o-color: #4fc3f7;
      --border: rgba(255,255,255,0.07);
      --text: #f0eee8;
      --muted: rgba(240,238,232,0.38);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }
    .blob-x { width: 420px; height: 420px; background: var(--x-color); top: -120px; left: -100px; }
    .blob-o { width: 360px; height: 360px; background: var(--o-color); bottom: -90px; right: -90px; }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
    }

    /* Header */
    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.45));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      text-align: center;
    }

    /* Score bar */
    .scorebar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .score-item {
      padding: 0.7rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      background: var(--surface);
      transition: background 0.3s;
    }
    .score-item:first-child { border-radius: 13px 0 0 13px; }
    .score-item:last-child  { border-radius: 0 13px 13px 0; }
    .score-item.active-x { background: rgba(232,93,117,0.12); }
    .score-item.active-o { background: rgba(79,195,247,0.12); }
    .score-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .score-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 1; }
    .score-num.x { color: var(--x-color); }
    .score-num.o { color: var(--o-color); }
    .score-num.draw { color: var(--muted); font-size: 1.4rem; }

    /* Status */
    .status-wrap { height: 2rem; display: flex; align-items: center; justify-content: center; }
    #status {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s;
    }
    #status .token { font-weight: 700; font-size: 1rem; }
    #status .token.x { color: var(--x-color); }
    #status .token.o { color: var(--o-color); }

    /* Board */
    .board-wrap { position: relative; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 64px rgba(0,0,0,0.5);
    }

    .cell {
      width: clamp(80px, 22vw, 110px);
      height: clamp(80px, 22vw, 110px);
      background: var(--surface);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      user-select: none;
      overflow: hidden;
    }
    .cell:hover:not(.taken) { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); transform: scale(1.04); }
    .cell:active:not(.taken) { transform: scale(0.96); }
    .cell.taken { cursor: default; }

    .mark {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      line-height: 1;
      transform: scale(0);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mark.show { transform: scale(1); }
    .mark.x { color: var(--x-color); text-shadow: 0 0 20px rgba(232,93,117,0.5); }
    .mark.o { color: var(--o-color); text-shadow: 0 0 20px rgba(79,195,247,0.5); }

    .cell.win-cell { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); animation: win-pulse 1s ease infinite alternate; }
    @keyframes win-pulse { from { box-shadow: none; } to { box-shadow: 0 0 18px rgba(255,255,255,0.1); } }

    /* Reset button */
    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.65rem 2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: rgba(255,255,255,0.18); }
    .reset-btn:active { transform: scale(0.96); }

    /* Win overlay */
    .win-msg {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,20,0.82);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .win-msg.show { opacity: 1; pointer-events: auto; }
    .win-msg-text { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-align: center; line-height: 1.3; }
    .win-msg-text small { display: block; font-family: 'Outfit', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }

    /* Leaderboard */
    .leaderboard {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .lb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
    }

    .lb-card:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.15);
    }

    .lb-rank  { font-weight: 600; font-size: 0.8rem; color: var(--muted); width: 30px; }
    .lb-name  { flex: 1; font-size: 0.85rem; font-weight: 500; }
    .lb-score { font-family: 'Playfair Display', serif; font-size: 1.2rem; }

    .lb-card.gold   { border-color: rgba(255,215,0,0.4);   box-shadow: 0 0 10px rgba(255,215,0,0.15); }
    .lb-card.silver { border-color: rgba(192,192,192,0.4); }
    .lb-card.bronze { border-color: rgba(205,127,50,0.4);  }
  </style>
</head>
<body>

<div class="blob blob-x"></div>
<div class="blob blob-o"></div>

<div class="wrapper">

  <div>
    <p class="eyebrow">Dua Pemain</p>
    <h1>Tic Tac Toe</h1>
  </div>

  <div class="scorebar">
    <div class="score-item active-x" id="score-x-wrap">
      <span class="score-label">Pemain X</span>
      <span class="score-num x" id="score-x">0</span>
    </div>
    <div class="score-item" id="score-draw-wrap">
      <span class="score-label">Seri</span>
      <span class="score-num draw" id="score-draw">0</span>
    </div>
    <div class="score-item" id="score-o-wrap">
      <span class="score-label">Pemain O</span>
      <span class="score-num o" id="score-o">0</span>
    </div>
  </div>

  <div class="status-wrap">
    <h2 id="status">Giliran: <span class="token x">X</span></h2>
  </div>

  <div style="margin-top:10px;">
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="normal">Normal</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="cell" onclick="klik(0)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(1)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(2)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(3)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(4)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(5)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(6)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(7)"><span class="mark"></span></div>
      <div class="cell" onclick="klik(8)"><span class="mark"></span></div>
    </div>
    <div class="win-msg" id="win-msg">
      <div class="win-msg-text" id="win-msg-text"></div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetGame()">↺ &nbsp; Reset</button>

  <!-- INPUT NAMA -->
  <div style="margin-top:10px;">
    <input id="playerName" placeholder="Masukkan nama..."
      style="padding:8px 12px; border-radius:8px; border:none; outline:none;">
    <button onclick="saveScore()"
      style="padding:8px 12px; border-radius:8px; border:none; cursor:pointer;">
      Simpan Skor
    </button>
  </div>

  <!-- 🏆 LEADERBOARD -->
  <div class="leaderboard">
    <h2 style="font-size:1rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted);">
      🏆 Leaderboard
    </h2>
    <div id="leaderboard-list">
      <p style="opacity:0.5; font-size:0.8rem;">Loading...</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
<script>
  const scores = { X: 0, O: 0, draw: 0 };

  const _origKlik = typeof klik === 'function' ? klik : null;
  window.klik = function(i) {
    const cell = document.querySelectorAll('.cell')[i];
    if (cell.classList.contains('taken')) return;
    if (_origKlik) _origKlik(i);
    updateVisuals();
  };

  const _origReset = typeof resetGame === 'function' ? resetGame : null;
  window.resetGame = function() {
    if (_origReset) _origReset();
    document.querySelectorAll('.cell').forEach(c => {
      c.classList.remove('taken', 'win-cell');
      const m = c.querySelector('.mark');
      m.textContent = '';
      m.className = 'mark';
    });
    document.getElementById('win-msg').classList.remove('show');
    setActivePlayer('X');
  };

  function setActivePlayer(p) {
    document.getElementById('score-x-wrap').className = 'score-item' + (p === 'X' ? ' active-x' : '');
    document.getElementById('score-o-wrap').className = 'score-item' + (p === 'O' ? ' active-o' : '');
    const cls = p.toLowerCase();
    document.getElementById('status').innerHTML = `Giliran: <span class="token ${cls}">${p}</span>`;
  }

  function updateVisuals() {
    if (typeof board === 'undefined') return;
    const cells = document.querySelectorAll('.cell');

    board.forEach((val, i) => {
      if (val && !cells[i].classList.contains('taken')) {
        cells[i].classList.add('taken');
        const m = cells[i].querySelector('.mark');
        m.textContent = val;
        m.className = `mark ${val.toLowerCase()} show`;
      }
    });

    const raw = document.getElementById('status').textContent;
    if (raw.includes('Menang') || raw.includes('menang') || raw.toLowerCase().includes('win')) {
      const winner = raw.includes('X') ? 'X' : 'O';
      scores[winner]++;
      document.getElementById(`score-${winner.toLowerCase()}`).textContent = scores[winner];
      const color = winner === 'X' ? '#e85d75' : '#4fc3f7';
      document.getElementById('win-msg-text').innerHTML = `<span style="color:${color}">${winner}</span> Menang! <small>Klik reset untuk main lagi</small>`;
      document.getElementById('win-msg').classList.add('show');
      highlightWin();
    } else if (raw.includes('Seri') || raw.includes('seri') || raw.toLowerCase().includes('draw')) {
      scores.draw++;
      document.getElementById('score-draw').textContent = scores.draw;
      document.getElementById('win-msg-text').innerHTML = `Seri! <small>Klik reset untuk main lagi</small>`;
      document.getElementById('win-msg').classList.add('show');
    } else if (raw.includes('O')) {
      setActivePlayer('O');
    } else {
      setActivePlayer('X');
    }
  }

  function highlightWin() {
    if (typeof winCombos === 'undefined' || typeof board === 'undefined') return;
    const cells = document.querySelectorAll('.cell');
    for (const [a, b, c] of winCombos) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        cells[a].classList.add('win-cell');
        cells[b].classList.add('win-cell');
        cells[c].classList.add('win-cell');
        break;
      }
    }
  }
</script>
</body>
</html>
